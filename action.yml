name: wait
description: Wait for a configured duration with cancellation-aware interruption
inputs:
  enabled:
    description: Optional boolean flag to enable or disable waiting
    required: false
    default: 'true'
  minutes:
    description: Optional non-negative number of minutes when seconds is omitted; fractional values are truncated after conversion
    required: false
  seconds:
    description: Optional non-negative number of seconds; fractional values are truncated
    required: false
  label:
    description: Optional descriptive label included in logs
    required: false
outputs:
  waited:
    description: Boolean flag indicating whether a positive-duration wait completed
  effective_seconds:
    description: Resolved effective wait duration in seconds
runs:
  using: node24
  main: dist/index.js
