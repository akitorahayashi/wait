name: wait
description: Wait for a configured duration with cancellation-aware interruption
inputs:
  enabled:
    description: Optional boolean flag to enable or disable waiting
    required: false
    default: 'true'
  minutes:
    description: Optional non-negative integer duration in minutes when seconds is omitted
    required: false
  seconds:
    description: Optional non-negative integer duration in seconds
    required: false
  label:
    description: Optional descriptive label included in logs
    required: false
outputs:
  waited:
    description: Boolean flag indicating whether a positive-duration wait completed
  effective_seconds:
    description: Resolved effective wait duration in seconds
runs:
  using: node24
  main: dist/index.js
