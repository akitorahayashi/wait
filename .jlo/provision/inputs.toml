# Provision input contract for jlo provision
# Configure these inputs in Jules GUI as needed.

[GH_TOKEN]
kind = "secret"
required = true
used_by = ["gh"]
when_unset = "gh authentication is unavailable in the Jules VM runtime"
description = "GitHub token used by gh CLI authentication in the Jules VM runtime. GitHub Actions workflow jobs do not consume this token."

[JUST_VERSION]
kind = "variable"
required = false
used_by = ["just"]
when_unset = "Install the latest just release"
description = "Version of just to install"
